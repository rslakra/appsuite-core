# Publish package to GitHub Packages from release tags.
name: Publish Maven Package to GitHub

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLISH_BRANCH: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref_name }}
    steps:
      - name: Checkout tag/release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PUBLISH_BRANCH }}

      - name: Set up JDK + Maven auth
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve release version from version.txt
        run: |
          #!/bin/bash
          set -euo pipefail

          VERSION_FILE="version.txt"

          # Check if the version file exists.
          if [ ! -f "$VERSION_FILE" ]; then
            echo "Error: Version file '$VERSION_FILE' not found."
            exit 1
          fi

          # Read current released version.
          RELEASED_VERSION=$(tr -d '[:space:]' < "$VERSION_FILE")
          echo "RELEASED_VERSION: ${RELEASED_VERSION}"

          # Generate next release version by incrementing patch.
          VERSION_PARTS=(${RELEASED_VERSION//./ })
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=$((VERSION_PARTS[2] + 1))
          RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          SNAPSHOT_VERSION="${RELEASE_VERSION}-SNAPSHOT"

          BUILD_TIMESTAMP=$(date +%s)
          BUILD_DATE=$(date -u "+%Y-%m-%dT%H:%M:%SZ")

          echo "RELEASE_VERSION: ${RELEASE_VERSION}, SNAPSHOT_VERSION: ${SNAPSHOT_VERSION}"
          echo "Publishing version ${RELEASE_VERSION} (from ${RELEASED_VERSION})"

          # Export env for subsequent steps.
          echo "BUILD_TIMESTAMP=${BUILD_TIMESTAMP}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "RELEASED_VERSION=${RELEASED_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}" >> "$GITHUB_ENV"

      - name: Print resolved version
        run: |
          echo "RELEASED_VERSION=${RELEASED_VERSION}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}"
          echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}"

      - name: Publish package to GitHub Packages
        run: mvn -B -ntp clean deploy -Drevision="${RELEASE_VERSION}" -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        run: |
          {
            echo "## Maven Publish Summary"
            echo ""
            echo "- Released version: \`${RELEASE_VERSION}\`"
            echo "- Previous version: \`${RELEASED_VERSION}\`"
            echo "- Snapshot version: \`${SNAPSHOT_VERSION}\`"
            echo "- Branch: \`${PUBLISH_BRANCH}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Actor: \`${GITHUB_ACTOR}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Persist version bump to version.txt
        run: |
          #!/bin/bash
          set -euo pipefail

          echo "${RELEASE_VERSION}" > version.txt
          echo "Updated version.txt to ${RELEASE_VERSION}"

          if git diff --quiet -- version.txt; then
            echo "version.txt is already up to date. Nothing to commit."
            exit 0
          fi

          git add version.txt
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: bump version to v${RELEASE_VERSION}"
          git push origin "HEAD:${PUBLISH_BRANCH}"

